<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Actividades</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h1 class="text-center">Recordatorio de Actividades</h1>
    
    <form method="POST" class="input-group mb-3">
        {% csrf_token %}
        <input type="text" name="tarea" class="form-control" placeholder="Escribe una nueva tarea..." required>
        <button class="btn btn-primary" type="submit">Agregar</button>
    </form>

    <ul class="list-group">
        {% for t in tareas %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
            {{ t.nombre }}
            <a href="/eliminar/{{ t.id }}/" class="btn btn-danger btn-sm">Eliminar</a>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
